# ==============================================
# Docker Compose - Local Development (No DB)
# ==============================================
# For laptops with local PostgreSQL installed
#
# Usage:
#   docker compose -f docker-compose.local.yml up -d
#
# Pre-requisites:
#   - PostgreSQL running locally on your machine
#   - Database configured (see docs/DATABASE_SETUP.md)
#
# Note: Uses .env file for all configuration

services:
  simrs-frontend:
    # IMAGE_TAG set by build.sh (e.g. IMAGE_TAG=abc1234 docker compose up)
    image: aryaramandhanu/simrs-simtech-fe:56a9d46
    container_name: simrs-frontend
    ports:
      - "${FRONTEND_PORT:-4173}:4173"
    depends_on:
      simrs-backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  simrs-backend:
    image: aryaramandhanu/simrs-simtech-be:56a9d46
    container_name: simrs-backend
    ports:
      - "${BACKEND_PORT:-5001}:${PORT:-5001}"
    environment:
      - NODE_ENV=development
      - PORT=${PORT:-5001}
      # Database - connects to host machine's PostgreSQL
      - DB_HOST=${DB_HOST:-host.docker.internal}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSL=${DB_SSL:-false}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:4173}
      # Keycloak SSO - all settings from .env
      - KEYCLOAK_ENABLED=${KEYCLOAK_ENABLED:-true}
      - KEYCLOAK_URL=${KEYCLOAK_URL}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - KEYCLOAK_CALLBACK_URL=${KEYCLOAK_CALLBACK_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${PORT:-5001}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: simrs-local-network
    driver: bridge
