# ==============================================
# Docker Compose - Production Deployment
# ==============================================
# Frontend + Backend only (uses external DB & Keycloak)
#
# Usage:
#   docker compose up -d
#   docker compose --env-file .env.production up -d
#
# Requirements:
#   - .env or .env.production configured
#   - External PostgreSQL database
#   - External Keycloak server (if SSO enabled)

services:
  simrs-frontend:
    image: aryaramandhanu/simrs-simtech-fe:1516cce
    container_name: simrs-frontend
    ports:
      - "${FRONTEND_PORT:-4173}:4173"
    depends_on:
      simrs-backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  simrs-backend:
    image: aryaramandhanu/simrs-simtech-be:1516cce
    container_name: simrs-backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - PORT=5000
      # Database (external PostgreSQL)
      - DB_HOST=${DB_HOST:-host.docker.internal}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSL=${DB_SSL:-false}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      # Keycloak SSO (external Keycloak)
      - KEYCLOAK_ENABLED=${KEYCLOAK_ENABLED:-false}
      - KEYCLOAK_URL=${KEYCLOAK_URL}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-simrs}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-simrs-app}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - KEYCLOAK_CALLBACK_URL=${KEYCLOAK_CALLBACK_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true

networks:
  default:
    name: simrs-network
    driver: bridge
