# ==============================================
# Docker Compose - Full Stack with PostgreSQL
# ==============================================
# Includes containerized PostgreSQL
#
# Usage:
#   docker compose up -d
#
# Requirements:
#   - .env file configured
#   - Keycloak running separately (if SSO enabled)

services:
  simrs-frontend:
    image: aryaramandhanu/simrs-simtech-fe:latest
    container_name: simrs-frontend
    ports:
      - "${FRONTEND_PORT:-4173}:4173"
    depends_on:
      - simrs-backend
    restart: always

  simrs-backend:
    image: aryaramandhanu/simrs-simtech-be:latest
    container_name: simrs-backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      - PORT=5000
      # Database Configuration
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSL=${DB_SSL:-false}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:4173}
      # Keycloak SSO (connects to external Keycloak)
      - KEYCLOAK_ENABLED=${KEYCLOAK_ENABLED:-false}
      - KEYCLOAK_URL=${KEYCLOAK_URL}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-simrs}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-simrs-app}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - KEYCLOAK_CALLBACK_URL=${KEYCLOAK_CALLBACK_URL}
    depends_on:
      - postgres
    restart: always

  postgres:
    image: postgres:15-alpine
    container_name: simrs-postgres
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
