apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: simrs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: simrs-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        envFrom:
        - secretRef:
            name: backend-secrets
        env:
        - name: PORT
          value: "5000"
        - name: DB_HOST
          value: "postgres"
        - name: DB_NAME
          value: "simrs_db"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
